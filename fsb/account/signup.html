<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fire Spelling Bee</title>
    <link rel="icon" type="image/png" href="/fsb/EMOJIS/C_bee.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Brush Script MT", "Brush Script Std", "Comic Sans MS", cursive;
            background-image: url('/fsb/fsb_background.png');
            background-repeat: repeat; 
            background-size: auto; 
            background-position: 0px 0px; 
            background-color: #eaff00;
            background-attachment: fixed;
        }
        button {
          background-color: #e34424;
          border-radius: 50000px;
          font-family: "Brush Script MT", "Brush Script Std", "Comic Sans MS", cursive;
        }
    </style>
</head>
<body>

  <h1>Join the <span style="color: mediumturquoise;" id="num_accounts_registered">...</span> people on the Fire Spelling Bee.</h1>
  <div class="signup">
    Username: <input id="username" style="min-width: 235px; border-radius: 40px; background-color: #f5bc42;" placeholder="3-24 characters, all letters and _ - only."><br>
    Display Name: <input id="displayname" style="max-width: 140px; border-radius: 40px; background-color: #f5bc42;" placeholder="Everyone can see this!"><br>
    Password: <input id="password" type="password" style="max-width: 140px; border-radius: 40px; background-color: #f5bc42;" placeholder="At least 6 characters."><br>
    <button onclick="signUp()">SIGN UP</button>

  </div>
    </div>

    <script>
        window.addEventListener('scroll', () => {
            let scrolled = window.pageYOffset;
            let yPos = Math.floor(-(scrolled * 0.80));
            document.body.style.backgroundPosition = `0px ${yPos}px`;
        });
    </script>

    <script>
    // 1. Load the global Supabase bundle (non-module version)
    // 1. Enter your Supabase credentials exactly as they appear in your dashboard
    var supabaseUrl = 'https://rgzympbrwrttbrioafjd.supabase.co'; // e.g., 'https://xyzcompany.supabase.co'
    var supabaseKey = 'sb_publishable_KBQTvKhl5HFq9zwpqbCK5Q_7um8h8t-';
    var tableName   = 'FireSpellingBeeAccounts';

    // 2. Build the native REST endpoint URL
    // Supabase exposes all tables under the /rest/v1/ path
    var apiEndpoint = supabaseUrl + '/rest/v1/' + tableName;

    function loadData() {
      // 3. Make a standard HTTP request using the native browser Fetch API
      fetch(apiEndpoint, {
        method: 'GET',
        headers: {
          'apikey': supabaseKey,
          'Authorization': 'Bearer ' + supabaseKey,
          'Content-Type': 'application/json'
        }
      })
      .then(function(response) {
        // Check if the server responded with an error (like 401 or 404)
        if (!response.ok) {
          throw new Error('HTTP network error! Status code: ' + response.status);
        }
        return response.json(); // Convert the raw response into a JSON object/array
      })
      .then(function(data) {
        // 4. Read the data array length
        var totalRows = data.length;
        
        document.getElementById("num_accounts_registered").innerHTML = totalRows
        console.log('Fetched all accounts!');
      })
      .catch(function(err) {
        console.error('Fetch operation failed:', err.message);
      });
    }

    // Run the function immediately when the script executes
    loadData();
  </script>

  <script>
    function signUp() {
      async function insertData() {
        const SUPABASE_URL = 'https://rgzympbrwrttbrioafjd.supabase.co';
        const API_KEY = 'sb_publishable_KBQTvKhl5HFq9zwpqbCK5Q_7um8h8t-';
        const TABLE_NAME = 'FireSpellingBeeAccounts';

        const url = `${SUPABASE_URL}/rest/v1/${TABLE_NAME}`;

        const payload = {
          column_name_1: 'value_1',
          column_name_2: 'value_2',
          column_name_3: 42
        };

        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'apikey': API_KEY,
              'Authorization': `Bearer ${API_KEY}`,
              'Content-Type': 'application/json',
              // Optional: Tells Supabase to return the newly inserted row data
              'Prefer': 'return=representation' 
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP Error ${response.status}: ${errorText}`);
          }

          // If 'return=representation' was passed, parse the returned row
          const data = await response.json();
          console.log('Success! Inserted data:', data);
          
        } catch (error) {
          console.error('Error inserting data:', error.message);
        }
      }

      insertData();

          }
  </script>
</body>
</html>
