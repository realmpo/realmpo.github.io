<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Spelling Bee - Homepage</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Brush Script MT", "Brush Script Std", "Comic Sans MS", cursive;
            
            /* 1. Setup the infinite background tiling directly on the body */
            background-image: url('/fsb/fsb_background.png');
            background-repeat: repeat; /* Tiles infinitely in all directions */
            background-size: auto; /* Keeps the honeycomb shapes true to size */
            background-position: 0px 0px; /* Starting position */
            background-color: #eaff00;
            background-attachment: fixed;
        }
        /* Test spacer to enable long scrolling */
        .spacer {
            height: 30000px; 
        }
    </style>
</head>
<body>

    <!-- No extra layout div needed anymore! -->

    <div class="content">
      <header>
        <img src="/fsb/logo.png" width="20%">
      </header>
      <h1>Fire Spelling Bee</h1>
      
    <div class="beehive-grid">
        <!-- Repeat this SVG block for each button in your hive -->
        <!-- Button 1 -->
        <div class="hive-item">
            <svg class="hex-wrapper" viewBox="0 0 100 115" xmlns="http://w3.org" width="130">
                <defs>
                    <pattern id="png-1" width="1" height="1" viewBox="0 0 100 115" preserveAspectRatio="xMidYMid slice">
                        <image href="/fsb/practice-button.png" width="100" height="115" />
                    </pattern>
                </defs>
                <polygon class="hex-clickable data-btn" data-id="1" points="50,0 100,28.8 100,86.2 50,115 0,86.2 0,28.8" fill="url(#png-1)" />
            </svg>
        </div>

        <!-- Button 2 -->
        <div class="hive-item">
            <svg class="hex-wrapper" viewBox="0 0 100 115" xmlns="http://w3.org" width="130">
                <defs>
                    <pattern id="png-2" width="1" height="1" viewBox="0 0 100 115" preserveAspectRatio="xMidYMid slice">
                        <image href="your-button-2.png" width="100" height="115" />
                    </pattern>
                </defs>
                <polygon class="hex-clickable data-btn" data-id="2" points="50,0 100,28.8 100,86.2 50,115 0,86.2 0,28.8" fill="url(#png-2)" />
            </svg>
        </div>

        <!-- Button 3 -->
        <div class="hive-item">
            <svg class="hex-wrapper" viewBox="0 0 100 115" xmlns="http://w3.org" width="130">
                <defs>
                    <pattern id="png-3" width="1" height="1" viewBox="0 0 100 115" preserveAspectRatio="xMidYMid slice">
                        <image href="your-button-3.png" width="100" height="115" />
                    </pattern>
                </defs>
                <polygon class="hex-clickable data-btn" data-id="3" points="50,0 100,28.8 100,86.2 50,115 0,86.2 0,28.8" fill="url(#png-3)" />
            </svg>
        </div>

        <!-- Button 4 -->
        <div class="hive-item">
            <svg class="hex-wrapper" viewBox="0 0 100 115" xmlns="http://w3.org" width="130">
                <defs>
                    <pattern id="png-4" width="1" height="1" viewBox="0 0 100 115" preserveAspectRatio="xMidYMid slice">
                        <image href="your-button-4.png" width="100" height="115" />
                    </pattern>
                </defs>
                <polygon class="hex-clickable data-btn" data-id="4" points="50,0 100,28.8 100,86.2 50,115 0,86.2 0,28.8" fill="url(#png-4)" />
            </svg>
        </div>
    </div>

    <div class="spacer"></div>

    <script>
        // Use event delegation to handle clicks across the entire hive efficiently
        document.querySelector('.beehive-grid').addEventListener('click', (event) => {
            const targetButton = event.target.closest('.data-btn');
            
            // Exit early if the user clicked outside a valid polygon
            if (!targetButton) return;

            const buttonId = targetButton.getAttribute('data-id');
            console.log(`Beehive Hexagon #${buttonId} clicked!`);
            alert(`Triggered action for button ${buttonId}`);
        });
    </script>

    </div>

    <!-- 3. Optimized JavaScript tracking background position changes -->
    <script>
        window.addEventListener('scroll', () => {
            // Get current scroll distance
            let scrolled = window.pageYOffset;
            
            /* 
               Calculate the slower speed. 
               Rounding it with Math.floor() prevents pixel flickering 
               and keeps the background pattern crisp as it moves.
            */
            let yPos = Math.floor(-(scrolled * 0.80));
            
            // Instantly apply the slow scroll to the body background
            document.body.style.backgroundPosition = `0px ${yPos}px`;
        });
    </script>

</body>
</html>
