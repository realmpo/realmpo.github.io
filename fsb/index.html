<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Spelling Bee - Homepage</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Brush Script MT", "Brush Script Std", "Comic Sans MS", cursive;
            
            /* 1. Setup the infinite background tiling directly on the body */
            background-image: url('/fsb/fsb_background.png');
            background-repeat: repeat; /* Tiles infinitely in all directions */
            background-size: auto; /* Keeps the honeycomb shapes true to size */
            background-position: 0px 0px; /* Starting position */
            background-color: #eaff00;
            background-attachment: fixed;
        }
        /* Test spacer to enable long scrolling */
        .spacer {
            height: 30000px; 
        }
        
        /* FIXED: Changed selector name to match your HTML container class */
        .beehive-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hive-item {
            position: relative;
            width: 120px;   /* Match your image width */
            height: 104px;  /* Match your image height */
        }

        /* FIXED: Mathematical snapping margin for 120x104 flat-top hexagons */
        .hive-item + .hive-item {
            margin-top: -26px; 
        }

        .hex-wrapper {
            width: 100%;
            height: 100%;
            display: block;
        }

        .hex-clickable {
            cursor: pointer;
            transition: transform 0.2s;
            transform-origin: center;
        }
        .hex-clickable:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="content">
      <header>
        <img src="/fsb/logo.png" width="20%">
      </header>
      <h1>Fire Spelling Bee</h1>
      
    <div class="beehive-grid">
        <!-- FIXED: Replaced all SVGs with corrected namespaces, viewboxes, and flat-top polygon coordinates -->
        <!-- Button 1 -->
        <div class="hive-item">
            <svg class="hex-wrapper" viewBox="0 0 100 86.6" xmlns="http://w3.org">
                <defs>
                    <pattern id="png-1" width="1" height="1" viewBox="0 0 100 86.6" preserveAspectRatio="xMidYMid slice">
                        <image href="/fsb/practice-button.png" width="100" height="86.6" />
                    </pattern>
                </defs>
                <polygon class="hex-clickable data-btn" data-id="1" points="25,0 75,0 100,43.3 75,86.6 25,86.6 0,43.3" fill="url(#png-1)" />
            </svg>
        </div>

        <!-- Button 2 -->
        <div class="hive-item">
            <svg class="hex-wrapper" viewBox="0 0 100 86.6" xmlns="http://w3.org">
                <defs>
                    <pattern id="png-2" width="1" height="1" viewBox="0 0 100 86.6" preserveAspectRatio="xMidYMid slice">
                        <image href="your-button-2.png" width="100" height="86.6" />
                    </pattern>
                </defs>
                <polygon class="hex-clickable data-btn" data-id="2" points="25,0 75,0 100,43.3 75,86.6 25,86.6 0,43.3" fill="url(#png-2)" />
            </svg>
        </div>

        <!-- Button 3 -->
        <div class="hive-item">
            <svg class="hex-wrapper" viewBox="0 0 100 86.6" xmlns="http://w3.org">
                <defs>
                    <pattern id="png-3" width="1" height="1" viewBox="0 0 100 86.6" preserveAspectRatio="xMidYMid slice">
                        <image href="your-button-3.png" width="100" height="86.6" />
                    </pattern>
                </defs>
                <polygon class="hex-clickable data-btn" data-id="3" points="25,0 75,0 100,43.3 75,86.6 25,86.6 0,43.3" fill="url(#png-3)" />
            </svg>
        </div>

        <!-- Button 4 -->
        <div class="hive-item">
            <svg class="hex-wrapper" viewBox="0 0 100 86.6" xmlns="http://w3.org">
                <defs>
                    <pattern id="png-4" width="1" height="1" viewBox="0 0 100 86.6" preserveAspectRatio="xMidYMid slice">
                        <image href="your-button-4.png" width="100" height="86.6" />
                    </pattern>
                </defs>
                <polygon class="hex-clickable data-btn" data-id="4" points="25,0 75,0 100,43.3 75,86.6 25,86.6 0,43.3" fill="url(#png-4)" />
            </svg>
        </div>
    </div>

    <div class="spacer"></div>

    <script>
        document.querySelector('.beehive-grid').addEventListener('click', (event) => {
            const targetButton = event.target.closest('.data-btn');
            if (!targetButton) return;

            const buttonId = targetButton.getAttribute('data-id');
            console.log(`Beehive Hexagon #${buttonId} clicked!`);
            alert(`Triggered action for button ${buttonId}`);
        });
    </script>

    </div>

    <script>
        window.addEventListener('scroll', () => {
            let scrolled = window.pageYOffset;
            let yPos = Math.floor(-(scrolled * 0.80));
            document.body.style.backgroundPosition = `0px ${yPos}px`;
        });
    </script>

</body>
</html>
