<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee Theme Parallax</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Brush Script MT", "Brush Script Std", "Comic Sans MS", cursive;
            
            /* 1. Setup the infinite background tiling directly on the body */
            background-image: url('/fsb/fsb_background.png');
            background-repeat: repeat; /* Tiles infinitely in all directions */
            background-size: auto; /* Keeps the honeycomb shapes true to size */
            background-position: 0px 0px; /* Starting position */
            background-color: #eaff00;
            background-attachment: fixed;
        }
        /* Test spacer to enable long scrolling */
        .spacer {
            height: 30000px; 
        }
    </style>
</head>
<body>

    <!-- No extra layout div needed anymore! -->

    <div class="content">
      <header>
        <img src="/fsb/logo.png" width="20%">
      </header>
      <h1>Fire Spelling Bee</h1>
      <div class="spacer"></div>
    </div>

    <!-- 3. Optimized JavaScript tracking background position changes -->
    <script>
        window.addEventListener('scroll', () => {
            // Get current scroll distance
            let scrolled = window.pageYOffset;
            
            /* 
               Calculate the slower speed. 
               Rounding it with Math.floor() prevents pixel flickering 
               and keeps the background pattern crisp as it moves.
            */
            let yPos = Math.floor(-(scrolled * 0.40));
            
            // Instantly apply the slow scroll to the body background
            document.body.style.backgroundPosition = `0px ${yPos}px`;
        });
    </script>

</body>
</html>
