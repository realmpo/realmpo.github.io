<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Spelling Bee - Homepage</title>
    <link rel="icon" type="image/png" href="/fsb/EMOJIS/C_bee.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Brush Script MT", "Brush Script Std", "Comic Sans MS", cursive;
            background-image: url('/fsb/fsb_background.png');
            background-repeat: repeat; 
            background-size: auto; 
            background-position: 0px 0px; 
            background-color: #eaff00;
            background-attachment: fixed;
        }

        .spacer {
            height: 30000px; 
        }

        /* 1. FLEX CONTEXT: Main structural column wrapper */
        .beehive-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        /* 2. FLEX ROW SYSTEM: Safely groups 5 buttons per line */
        .hive-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            height: 156px; /* Total height of the staggered row height block */
            margin-bottom: -52px; /* Pulls the NEXT row upward to interlock perfectly */
        }

        /* 3. INDIVIDUAL CELL: Pulls elements side-by-side with a negative left margin */
        .hive-item {
            position: relative;
            width: 120px;   
            height: 104px;  
        }

        /* Pulls buttons together horizontally to link the side teeth */
        .hive-item + .hive-item {
            margin-left: -30px; 
        }

        /* 4. THE ZIG-ZAG MATH: Modulo shifts the 2nd and 4th element down inside EVERY row */
        .hive-row .hive-item:nth-child(2),
        .hive-row .hive-item:nth-child(4) {
            transform: translateY(52px); /* Exactly half the button height */
        }

        .hex-wrapper {
            width: 100%;
            height: 100%;
            display: block;
        }

        .hex-clickable {
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            transform-origin: center;
        }

        .hex-clickable:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
            position: relative;
            z-index: 10; /* Ensures the hovered button pops above neighbors cleanly */
        }
        button {
          background-color: #e34424;
          border-radius: 50000px;
          font-family: "Brush Script MT", "Brush Script Std", "Comic Sans MS", cursive;
        }
        .loginsignupbuttons {
          font-size: 40px;
        }
    </style>
</head>

<script>
// 1. Load the global Supabase bundle (non-module version)
 // 1. Enter your Supabase credentials exactly as they appear in your dashboard
    var supabaseUrl = 'https://rgzympbrwrttbrioafjd.supabase.co'; // e.g., 'https://xyzcompany.supabase.co'
    var supabaseKey = 'sb_publishable_KBQTvKhl5HFq9zwpqbCK5Q_7um8h8t-';
    var tableName   = 'FireSpellingBeeAccounts';

    // 2. Build the native REST endpoint URL
    // Supabase exposes all tables under the /rest/v1/ path
    var apiEndpoint = supabaseUrl + '/rest/v1/' + tableName;

    function loadData() {
      // 3. Make a standard HTTP request using the native browser Fetch API
      fetch(apiEndpoint, {
        method: 'GET',
        headers: {
          'apikey': supabaseKey,
          'Authorization': 'Bearer ' + supabaseKey,
          'Content-Type': 'application/json'
        }
      })
      .then(function(response) {
        // Check if the server responded with an error (like 401 or 404)
        if (!response.ok) {
          throw new Error('HTTP network error! Status code: ' + response.status);
        }
        return response.json(); // Convert the raw response into a JSON object/array
      })
      .then(function(data) {
        // 4. Read the data array length
        var totalRows = data.length;
        
        document.getElementById("num_accounts_registered").innerHTML = totalRows
        console.log('Fetched all accounts!');
      })
      .catch(function(err) {
        console.error('Fetch operation failed:', err.message);
      });
    }

    // Run the function immediately when the script executes
    loadData();
  </script>
