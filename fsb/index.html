<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee Theme Parallax</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Brush Script MT", "Brush Script Std", "Comic Sans MS", cursive;
            
            /* 1. Setup the infinite background tiling directly on the body */
            background-image: url('your-bee-image.jpg');
            background-repeat: repeat; /* Tiles infinitely in all directions */
            background-size: auto; /* Keeps the honeycomb shapes true to size */
            background-position: 0px 0px; /* Starting position */
            background-color: #E2EC11; /* Yellow fallback color */
        }

        /* 2. Style your website content layer */
        .content {
            position: relative;
            padding: 50px;
            max-width: 800px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95); /* High contrast content box */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Test spacer to enable long scrolling */
        .spacer {
            height: 30000px; 
        }
    </style>
</head>
<body>

    <!-- No extra layout div needed anymore! -->

    <div class="content">
      <header>
        <img src="/fsb/logo.png">
      </header>
      <h1>Fire Spelling Bee</h1>
      <div class="spacer"></div>
    </div>

    <!-- 3. Optimized JavaScript tracking background position changes -->
    <script>
        window.addEventListener('scroll', () => {
            let scrolled = window.pageYOffset;
            
            /* 
               Moves the tile coordinate upward by 20% of the total scroll distance. 
               This forces the pattern to loop continuously down the infinite grid.
            */
            let yPos = -(scrolled * 0.2);
            
            // Alter the background offset coordinate dynamically
            document.body.style.backgroundPosition = `0px ${yPos}px`;
        });
    </script>

</body>
</html>
