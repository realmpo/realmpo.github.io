<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My Website</title>
    
    <!-- 1. The GitHub Pages SPA Router Cleanup Script (Keep this exactly as it was) -->
    <script type="text/javascript">
        (function(l) {
            if (l.search[1] === 'p' ) {
                var q = {};
                l.search.slice(1).split('&').forEach(function(v) {
                    var a = v.split('=');
                    q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
                });
                if (q.p !== undefined) {
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + (q.p ? '/' + q.p : '') +
                        (q.q ? ('?' + q.q) : '') +
                        l.hash
                    );
                }
            }
        }(window.location));
    </script>

    <!-- 2. Your Targeted Activation Routing Logic -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const contentContainer = document.getElementById('app-content');

            // Regular Expression to check if path starts EXACTLY with /123abc/
            // It matches: /123abc/, /123abc/something, /123abc/anything/else/here
            const targetPattern = /^\/sites(\/|$)/;

            // Check if it's the home page
            if (currentPath === '/' || currentPath === '/index.html') {
                contentContainer.innerHTML = `
                    <h1>Home Page</h1>
                    <p>Welcome! Try typing <code>/sites/testing</code> in the URL bar.</p>
                `;
                return;
            }

            // Target Activation Check
            if (targetPattern.test(currentPath)) {
                // Extract whatever the user typed AFTER "/123abc/"
                const subPath = currentPath.replace(/^\/123abc\/?/, '');
                
                contentContainer.innerHTML = `
                    <h1>🔒 Custom Area Activated</h1>
                    <p>You successfully matched the <strong>/123abc/</strong> pattern.</p>
                    <p>Sub-route typed: <code>${subPath || '(none)'}</code></p>
                `;
            } else {
                // Fail-safe: If they typed any other random URL, show a real 404
                document.title = "404 Not Found";
                contentContainer.innerHTML = `
                    <h1>⚠️ 404 - Page Not Found</h1>
                    <p>The path <code>${currentPath}</code> does not exist on this website.</p>
                    <a href="/">Go back home</a>
                `;
            }
        });
    </script>
</head>
<body>

    <!-- This container handles all your dynamic page views -->
    <div id="app-content">
        <h1>Loading...</h1>
    </div>

</body>
</html>
