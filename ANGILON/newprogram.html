<!DOCTYPE html>
<html>
  <span id="R">Loading editor...</span>
  <script>
    // 1. Fetch string and parse it into a real JavaScript array
    let myPrograms = localStorage.getItem("angilonStored_Programs");
    myPrograms = myPrograms ? JSON.parse(myPrograms) : [];

    const newProgram_uuid = crypto.randomUUID();
    
    // 2. Add the new program to the array
    myPrograms = [...myPrograms, {filename: "new_program.agl", id: newProgram_uuid, version: 1, code: "", created: Date.now(), lastUpdated: Date.now()}];
    
    // 3. Convert the array back to a string and save it safely
    localStorage.setItem("angilonStored_programs", JSON.stringify(myPrograms));
    
    // 4. Use window.location for a reliable, fast redirect
    window.location.href = `/ANGILON/?editor=${newProgram_uuid}`;
  </script>
</html>
